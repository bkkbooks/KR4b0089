body:
  text: 卷一駕出北郭門行駕出北郭門行駕出北郭門馬樊不肯馳下車步踟躕仰折枯楊枝顧聞丘林中噭噭有悲啼借問啼者出何為乃如斯親母舍我歿後母憎孤兒饑寒無衣食舉動鞭捶施骨消肌肉盡體若枯樹皮藏我空室中父還不能知上冢察故處存亡永別離親母何可見淚下聲正嘶棄我於此間窮厄豈有貲傳言後代人以此為明規樂府詩集六十一初學記二十八作樂府詩詩紀十七琴歌琴歌奕奕天門開大魏應期運青蓋巡九州在東西人怨士為知己死女為悅者玩恩義苟潛暢他人焉能亂三國志王粲傳注文選六十齊竟陵文宣王行狀注御覽五百七十二樂府詩集六十詩紀十七又吳棫韻補四引運怨二韻及怨玩二韻詠史詩二首誤哉秦穆公身沒從三良忠臣不違命隨軀就死亡低頭闚壙戶仰視日月光誰謂此何處恩義不可忘路人為流涕黃鳥鳴高桑類聚五十五作阮瑀詩廣文選八詩紀十七燕丹養勇士荊軻為上賓圖擢盡匕首長驅西入秦素車駕白馬相送易水津漸離擊筑歌悲聲感路人舉坐同咨嗟歎氣若青雲同上雜詩二首臨川多悲風秋日苦清涼客子易為戚感此用哀傷攬衣起躑躅上觀心與房三星守故次明月未收光雞鳴當何時朝晨尚未央還坐長歎息憂憂安可忘類聚二十七類聚三十四作七哀詩廣文選十作行詩詩紀十七我行自凜秋季冬乃來歸置酒高堂上友朋集光輝念當復離別涉路險且夷思慮益惆悵淚下霑裳衣類聚二十七廣文選十詩紀十七七哀詩丁年難再遇富貴不重來良時忽一過身體為土灰冥冥九泉室漫漫長夜臺身盡氣力索精魂靡所能嘉殽設不御旨酒盈觴杯出壙望故鄉但見蒿與萊類聚三十四廣文選九詩紀十七又初學記十四引來灰臺能盃五韻隱士四皓潛南岳老萊竄河濱顏回樂陋巷許由安賤貧伯夷餓首陽天下歸其仁何患處貧苦但當守明真類聚三十六鳴沙石室古籍叢殘類書殘卷高尚門詩紀十七苦雨苦雨滋玄冬引日彌且長丹墀自殲殪深樹猶沾裳客行易感悴我心摧已傷登臺望江沔陽侯沛洋洋類聚二詩紀十七失題白髮隨櫛墮未寒思厚衣四支易懈倦行步益疏遲常恐時歲盡魂魄忽高飛自知百年後堂上生旅葵類聚十八詩紀十七公讌陽春和氣動賢主以崇仁布惠綏人物降愛常所親上堂相娛樂中外奉時珍五味風雨集杯酌若浮雲闕初學記十四怨詩民生受天命漂若河中塵雖稱百齡壽孰能應此身猶獲嬰凶禍流落恆苦心闕類聚三十樂府詩集四十一詩紀十七
