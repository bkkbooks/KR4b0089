body:
  text: 卷二紀征賦仰天民之高衢兮慕在昔之遐軌希篤聖之崇綱兮惟弘哲而為紀同天工而人代兮匪賢智其能使五材陳而並序靜亂由乎干戈惟蠻荊之作讎將治兵而濟河遂臨河而就濟瞻禹績之茫茫距疆澤以潛流經崑崙之高岡目幽蒙以廣衍遂霑濡而難量藝文類聚五十九止欲賦夫何淑女之佳麗顏㶷㶷以流光歷千代其無匹超古今而特章執妙年之方盛性聰惠以和良稟純潔之明節後申禮以自防重行義以輕身志高尚乎貞薑豫情説其美麗無須臾而有忘思桃夭之所宜願無衣之同裳懷紆結而不暢兮魂一夕而九翔出房戶以躑躅覩天漢之無津傷匏瓜之無偶悲織女之獨勤還伏枕以求寐庶通夢而交神神惚恍而難遇思交錯以繽紛遂終夜而靡見東方旭以既晨知所思之不得乃抑情以自信藝文類聚十八佇延首以極視兮意謂是而復非文選謝宣遠張子房詩注范彥龍贈張稷詩注曹顏遠思友人詩注謝玄暉齊敬皇后哀册文注思在體為素粉悲隨衣以消除文鏡祕府論西卷箏賦惟夫箏之奇妙極五音之幽微苞群聲以作主冠衆樂而為師稟清和于律呂籠絲木以成資身長六尺應律數也絃有十二四時度也柱高三寸三才具位也故能清者感天濁者合地五聲並用動靜簡易大興小附重發輕隨折而復扶循覆逆開浮沈抑揚升降綺靡殊聲妙巧不識其為平調定均不疾不徐遲速合度君子之衢也慷慨磊落卓礫盤紆壯士之節也曲高和寡妙妓雖工伯牙能琴于茲為朦皎懌翕純庶配其蹤延年新聲豈比能同陳惠李文曷能是逢藝文類聚四十四初學記十六兩引鸚鵡賦惟翩翩之豔鳥誕嘉類于京都穢夷風而弗處慕聖惠而來徂被坤文之黃色服離光之朱形配秋英以離緑苞天地以耀榮藝文類聚九十一謝曹公箋謝曹公箋一得披玄雲望白日唯力是視敢有二心文選謝靈運擬魏太子鄴中集詩注為曹公作書與孫權為曹公作書與孫權離絶以來于今三年無一日而忘前好亦猶姻媾之義恩情已深違異之恨中間尚淺也孤懷此心君豈同哉每覽古今所由改趣因緣侵辱或起瑕舋心忿意危用成大變若韓信傷心于失楚彭寵積望于無異盧綰嫌畏于已隙英布憂迫于情漏此事之緣也孤與將軍恩如骨肉割授江南不屬本州豈若淮陰捐舊之恨抑遏劉馥相厚益隆寧放朱浮顯露之奏無匿張勝貸故之變匪有陰構賁赫之告固非燕王淮南之舋也而忍絶王命明棄碩交實為佞人所構會也夫似是之言莫不動聽因形設象易為變觀示之以禍難激之以恥辱大丈夫雄心能無憤發昔蘇秦説韓羞以牛從韓王按劍作色而怒雖兵折地割猶不為悔人之情也仁君年壯氣盛緒信所嬖既懼患至兼懷忿恨不能復遠度孤心近慮事勢遂齎見薄之決計秉翻然之成議加劉備相扇揚事結舋連推而行之想暢本心不願于此也孤之薄德位高任重幸蒙國朝將泰之運蕩平天下懷集異類喜得全功長享其福而姻親坐離厚援生隙常恐海內多以相責以為老夫苞藏禍心陰有鄭武取胡之詐乃使仁君翻然自絶以是忿忿懷慚反惻常思除棄小事更申前好二族俱榮流祚後嗣以明雅素中誠之效抱懷數年未得散意昔赤璧之役遭離疫氣燒船自還以避惡地非周瑜水軍所能抑挫也江陵之守物盡穀殫無所復據徙民還師又非瑜之所能敗也荊土本非己分我盡與君冀取其餘非相侵肌膚有所割損也思計此變無傷于孤何必自遂于此不復還之高帝設爵以延田橫光武指河而誓朱鮪君之負纍豈如二子是以至情願聞德音往年在譙新造舟船取足自載以至九江貴欲觀湖漅之形定江濱之民耳非有深入攻戰之計將恐議者大為己榮自謂策得長無西患重以此故未肯回情然智者之慮慮于未形達者所規規于未兆是故子胥知姑蘇之有麋鹿輔果識智伯之為趙禽穆生謝病以免楚難鄒陽北遊不同吳禍此四士者豈聖人哉徒通變思深以微知著耳以君之明觀孤術數量君所據相計土地豈勢少力乏不能遠舉割江之表宴安而已哉甚未然也若恃水戰臨江塞要欲令王師終不得渡亦未必也夫水戰千里情巧萬端越為三軍吳曾不禦漢潛夏陽魏豹不意江河雖廣其長難衛也凡事有宜不得盡言將修舊好而張形勢更無以威脅重敵人然有所恐恐書無益何則往者軍逼而自引還今日在遠而興慰納辭遜意狹謂其力盡適以增驕不足相動但明效古當自圖之耳昔淮南信左吳之策隗囂納王元之言彭寵受親吏之計三夫不寤終為世笑梁王不受詭勝竇融斥逐張玄二賢既覺福亦隨之願君少留意焉若能內取子布外擊劉備以效赤心用復前好則江表之任長以相付高位重爵坦然可觀上令聖朝無東顧之勞下令百姓保安全之福君享其榮孤受其利豈不快哉若忽至誠以處僥幸婉彼二人不忍加罪所謂小人之仁大仁之賊大雅之人不肯為此也若憐子布願言俱存亦能傾心去恨順君之情更與從事取其後善但禽劉備亦足為效開設二者審處一焉聞荊揚諸將並得降者皆言交州為君所執豫章距命不承執事疫旱並行人兵減損各求進軍其言云云孤聞此言未以為説然道路既遠降者難信幸人之災君子不為且又百姓國家之有加懷區區樂欲崇和庶幾明德來見昭副不勞而定于孤益貴是故按兵守次遣書致意古者兵交使在其中願仁君及孤虛心回意以應詩人補袞之歎而慎周易牽復之義濯鱗清流飛翼天衢良時在茲勗之而已文選藝文類聚二十五為曹公與劉備書為曹公與劉備書披懷解帶投分寄意文選潘嶽金谷集作詩注文質論蓋聞日月麗天可瞻而難附群物著地可見而易制夫遠不可識文之觀也近而易察質之用也文虛質實遠疏近密援之斯至動之應疾兩儀通數固無攸失若乃陽春敷華遇衝風而隕落素葉變秋既究物而定體麗物若偽醜器多牢華璧易碎金鐵難陶故言多方者中難處也術饒津者要難求也意弘博者情難足也性明察者下難事也通士以四奇高人必有四難之忌且少言辭者政不煩也寡知見者物不擾也專一道者思不散也混濛蔑者民不備也質士以四短違人必有四安之報故曹參相齊寄託獄市欲令姦人有所容立及為宰相飲酒而已故夫安劉氏者周勃正嫡位者周勃大臣木強不至華言孝文上林苑欲拜嗇夫釋之前諫意崇敦朴自是以降其為宰相皆取堅強一學之士安用奇才使變典法藝文類聚二十二弔伯夷弔伯夷余以王事適彼洛師瞻望首陽敬弔伯夷東海讓國西山食薇重德輕身隱景潛暉求仁得仁報之仲尼沒而不朽身沈名飛稽首憑弔嚮往深之藝文類聚三十七
